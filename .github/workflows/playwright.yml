name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          (cd interface && bun install)
          (cd server && bun install)

      - name: Run DB Migration
        run: cd server && bun run migration:run
        env:
          DATABASE_PATH: data/mr_market.db

      - name: Run DB seeder
        run: cd server && bun run migration:seed
        env:
          DATABASE_PATH: data/mr_market.db

      - name: Start server and wait for health check
        run: |
          SERVER_LOG=/tmp/mr-market-playwright-server.log
          HEALTH_URL=http://localhost:3000/health
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=3

          cd server
          bun run start:dev >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!
          echo "Started server with PID $SERVER_PID"
          echo "Waiting for $HEALTH_URL to become available..."

          attempt=1
          until curl --output /dev/null --silent --fail "$HEALTH_URL"; do
            if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
              echo "Failed to connect to $HEALTH_URL after $MAX_ATTEMPTS attempts."
              echo "Last 200 lines of server log:"
              tail -n 200 "$SERVER_LOG" || true
              exit 1
            fi

            echo "Attempt $attempt/$MAX_ATTEMPTS: server not ready yet"
            attempt=$((attempt + 1))
            sleep "$SLEEP_SECONDS"
          done

          echo "$HEALTH_URL is now available."
        env:
          DATABASE_PATH: data/mr_market.db
          JWT_SECRET: 6b23439e8fee67c5da38b61b8779e9f41a5e3e36efe723c6299dd2111896def6
          ADMIN_PASSWORD: 123123

      - name: Install Playwright Browsers
        run: bun x playwright install --with-deps
        working-directory: ./interface

      - name: Run Playwright tests
        run: bun x playwright test --config ./playwright.config.ts --project=chromium
        working-directory: ./interface
        env:
          PUBLIC_HUFI_BACKEND_URL: "http://localhost:3000"
          JWT_SECRET: 6b23439e8fee67c5da38b61b8779e9f41a5e3e36efe723c6299dd2111896def6
          ADMIN_PASSWORD: 123123

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./interface/playwright-report/
          retention-days: 30
