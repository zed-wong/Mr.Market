# Arbitrage Strategy Configuration
# Hummingbot-compatible YAML definition for arbitrage strategy

strategy: arbitrage

# REQUIRED USER IDENTIFICATION - Replace with actual values when using
userId: USER_ID_HERE  # Replace with actual user ID
clientId: CLIENT_ID_HERE  # Replace with actual client ID
pair: ETH-USDT  # Trading pair to monitor for arbitrage

# EXCHANGE CONFIGURATION - Two exchanges for arbitrage
exchangeAName: binance  # First exchange
exchangeBName: coinbase  # Second exchange

exchanges:
  - exchange: binance
    candles:
      - id: binance_market
        trading_pair: ETH-USDT
        interval: 1m
  - exchange: coinbase
    candles:
      - id: coinbase_market
        trading_pair: ETH-USD
        interval: 1m

controller:
  candles: binance_market
  minProfitability: 0.01
  amountToTrade: 1.0
  checkIntervalSeconds: 10
  maxOpenOrders: 5
  gasAdjustmentFactor: 1.0
  targetProfitability: 0.015
  slippageTolerance: 0.005
