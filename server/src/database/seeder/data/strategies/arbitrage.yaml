# Arbitrage Strategy Configuration
# Hummingbot-compatible YAML definition for arbitrage strategy

strategy: arbitrage

exchanges:
  - exchange: binance
    candles:
      - id: binance_market
        trading_pair: ETH-USDT
        interval: 1m
  - exchange: coinbase
    candles:
      - id: coinbase_market
        trading_pair: ETH-USD
        interval: 1m

controller:
  candles: binance_market
  min_profitability: 0.01
  amount_to_trade: 1.0
  check_interval_seconds: 10
  max_open_orders: 5
  gas_adjustment_factor: 1.0
  target_profitability: 0.015
  slippage_tolerance: 0.005
