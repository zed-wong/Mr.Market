# Pure Market Making Strategy Configuration
# Hummingbot-compatible YAML definition for pure market making strategy

strategy: pure_market_making

# REQUIRED USER IDENTIFICATION - Replace with actual values when using
userId: USER_ID_HERE  # Replace with actual user ID
clientId: CLIENT_ID_HERE  # Replace with actual client ID
pair: BTC-USDT  # Trading pair
exchangeName: binance  # Exchange name for execution

# Optional oracle exchange for price data
# oracleExchangeName: mexc

exchanges:
  - exchange: binance
    candles:
      - id: market_data
        trading_pair: BTC-USDT
        interval: 1m

controller:
  candles: market_data
  bidSpread: 0.001
  askSpread: 0.001
  orderAmount: 0.001
  orderRefreshTime: 15000
  numberOfLayers: 1
  priceSourceType: MID_PRICE
  amountChangePerLayer: 0
  amountChangeType: percentage
  ceilingPrice: 0
  floorPrice: 0
  hangingOrdersEnabled: false
  makerHeavyMode: false
  makerHeavyBiasBps: 20
  inventoryTargetBaseRatio: 0.5
  inventorySkewFactor: 0.25
  currentBaseRatio: 0.5
