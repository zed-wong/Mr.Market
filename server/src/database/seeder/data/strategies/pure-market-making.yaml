# Pure Market Making Strategy Configuration
# Hummingbot-compatible YAML definition for pure market making strategy

strategy: pure_market_making

exchanges:
  - exchange: binance
    candles:
      - id: market_data
        trading_pair: BTC-USDT
        interval: 1m

controller:
  candles: market_data
  bid_spread: 0.001
  ask_spread: 0.001
  order_amount: 0.001
  order_refresh_time: 15000
  number_of_layers: 1
  price_source_type: MID_PRICE
  amount_change_per_layer: 0
  amount_change_type: percentage
  ceiling_price: 0
  floor_price: 0
  hanging_orders_enabled: false
  maker_heavy_mode: false
  maker_heavy_bias_bps: 20
  inventory_target_base_ratio: 0.5
  inventory_skew_factor: 0.25
  current_base_ratio: 0.5
