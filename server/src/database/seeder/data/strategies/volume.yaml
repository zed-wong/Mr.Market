# Volume Strategy Configuration
# Hummingbot-compatible YAML definition for volume execution strategy

strategy: volume
executionMode: amm_dex

# REQUIRED USER IDENTIFICATION - Replace with actual values when using
userId: USER_ID_HERE  # Replace with actual user ID
clientId: CLIENT_ID_HERE  # Replace with actual client ID

# DEX-SPECIFIC CONFIGURATION
executionCategory: amm_dex  # Execution category for DEX
dexId: uniswapV3  # DEX identifier
chainId: 1  # EVM chain ID (1 = Ethereum mainnet)
tokenIn: 0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2  # Input token address (WETH)
tokenOut: 0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48  # Output token address (USDC)
feeTier: 3000  # Uniswap V3 fee tier in ppm (500, 3000, 10000)
slippageBps: 100  # Slippage tolerance in basis points

# Optional recipient address (defaults to operator wallet)
# recipient: 0x1111111111111111111111111111111111111111

exchanges:
  - exchange: uniswap_v3
    chain_id: 1
    candles:
      - id: price_data
        trading_pair: WBTC-USDC
        interval: 5m

controller:
  candles: price_data
  swapSlippages:
    - tokenIn: WETH
      tokenOut: USDC
      slippageBps: 50
    - tokenIn: USDC
      tokenOut: WETH
      slippageBps: 75
  swapInterval: 60
  incrementPercentage: 0.5
  intervalTime: 30
  tradeAmount: 0.1
  numTrades: 100
  pricePushRate: 1.0
  postOnlySide: null  # First trade side: 'buy' or 'sell' (null for auto)
  cycleLimits:
    maxCycleVolume: 10.0
    maxCycleTrades: 50
    cycleResetInterval: 3600
